<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            dark: {
              bg: '#090A14',
              card: '#0F111A',
              border: '#1E2030',
              input: '#13151F',
            },
            primary: '#DF6B33',
            primaryHover: '#C95D2A',
          },
          fontFamily: {
            heading: ['Poppins', 'sans-serif'],
            body: ['Inter', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    body { background-color: #090A14; }

    .input-field:focus-within .input-icon {
      color: #DF6B33;
    }

    .input-field.has-error .input-icon {
      color: #EF4444;
    }

    .social-btn:hover {
      background-color: #1a1d2e;
      border-color: #DF6B33;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    .float-animation {
      animation: float 4s ease-in-out infinite;
    }

    .float-animation-delay {
      animation: float 4s ease-in-out 1s infinite;
    }

    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-text-fill-color: #E2E8F0;
      -webkit-box-shadow: 0 0 0px 1000px #13151F inset;
      transition: background-color 5000s ease-in-out 0s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }

    .shake {
      animation: shake 0.4s ease-in-out;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .error-msg {
      animation: slideDown 0.2s ease-out;
    }
  </style>
</head>
<body class="min-h-screen bg-dark-bg font-body text-gray-300 flex items-center justify-center p-4">

  <div class="w-full max-w-md">

    <!-- Logo + Title -->
    <div class="text-center mb-8 float-animation">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary/10 border border-primary/20 mb-4">
        <i data-lucide="user-round-plus" class="w-8 h-8 text-primary"></i>
      </div>
      <h1 class="font-heading font-extrabold text-3xl text-white tracking-tight">Create Account</h1>
      <p class="text-gray-500 mt-2 text-sm">Join us and get started today</p>
    </div>

    <!-- Register Card -->
    <div class="bg-dark-card rounded-3xl border border-dark-border p-6 sm:p-8 shadow-2xl shadow-black/50">

      <!-- Form -->
      <form id="registerForm" class="space-y-4" novalidate onsubmit="handleRegister(event)">

        <!-- Full Name -->
        <div class="input-field relative" id="nameField">
          <label for="name" class="block text-xs font-medium text-gray-400 mb-2 tracking-wide uppercase">Full Name</label>
          <div class="relative">
            <span class="input-icon absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 transition-colors duration-200">
              <i data-lucide="user" class="w-5 h-5"></i>
            </span>
            <input
              id="name"
              type="text"
              placeholder="John Doe"
              autocomplete="name"
              oninput="clearError('name')"
              class="w-full bg-dark-input border border-dark-border rounded-xl pl-12 pr-4 py-3.5 text-gray-200 placeholder-gray-600 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/30 transition-all duration-200 text-sm"
            >
          </div>
          <p id="nameError" class="hidden text-xs text-red-400 mt-1.5 flex items-center gap-1 error-msg"></p>
        </div>

        <!-- Email -->
        <div class="input-field relative" id="emailField">
          <label for="email" class="block text-xs font-medium text-gray-400 mb-2 tracking-wide uppercase">Email</label>
          <div class="relative">
            <span class="input-icon absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 transition-colors duration-200">
              <i data-lucide="mail" class="w-5 h-5"></i>
            </span>
            <input
              id="email"
              type="email"
              placeholder="you@example.com"
              autocomplete="email"
              oninput="clearError('email')"
              class="w-full bg-dark-input border border-dark-border rounded-xl pl-12 pr-4 py-3.5 text-gray-200 placeholder-gray-600 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/30 transition-all duration-200 text-sm"
            >
          </div>
          <p id="emailError" class="hidden text-xs text-red-400 mt-1.5 flex items-center gap-1 error-msg"></p>
        </div>

        <!-- Phone -->
        <div class="input-field relative" id="phoneField">
          <label for="phone" class="block text-xs font-medium text-gray-400 mb-2 tracking-wide uppercase">Phone <span class="text-gray-600 normal-case font-normal">(Optional)</span></label>
          <div class="relative">
            <span class="input-icon absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 transition-colors duration-200">
              <i data-lucide="phone" class="w-5 h-5"></i>
            </span>
            <input
              id="phone"
              type="tel"
              placeholder="0123456789"
              autocomplete="tel"
              maxlength="10"
              oninput="clearError('phone'); this.value = this.value.replace(/\D/g, '')"
              class="w-full bg-dark-input border border-dark-border rounded-xl pl-12 pr-4 py-3.5 text-gray-200 placeholder-gray-600 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/30 transition-all duration-200 text-sm"
            >
          </div>
          <p id="phoneError" class="hidden text-xs text-red-400 mt-1.5 flex items-center gap-1 error-msg"></p>
        </div>

        <!-- Gender -->
        <div id="genderField">
          <label class="block text-xs font-medium text-gray-400 mb-2 tracking-wide uppercase">Gender <span class="text-gray-600 normal-case font-normal">(Optional)</span></label>
          <div class="flex gap-4 mt-1">
            <label class="flex items-center gap-2 cursor-pointer group">
              <div class="relative">
                <input type="radio" name="gender" value="male" class="sr-only peer/male">
                <div class="w-5 h-5 rounded-full border border-dark-border bg-dark-input peer-checked/male:bg-primary peer-checked/male:border-primary transition-all duration-200 flex items-center justify-center">
                  <div class="w-2 h-2 rounded-full bg-white opacity-0 peer-checked/male:opacity-100 transition-opacity"></div>
                </div>
              </div>
              <span class="text-sm text-gray-400 group-hover:text-gray-300 transition-colors select-none">Male</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer group">
              <div class="relative">
                <input type="radio" name="gender" value="female" class="sr-only peer/female">
                <div class="w-5 h-5 rounded-full border border-dark-border bg-dark-input peer-checked/female:bg-primary peer-checked/female:border-primary transition-all duration-200 flex items-center justify-center">
                  <div class="w-2 h-2 rounded-full bg-white opacity-0 peer-checked/female:opacity-100 transition-opacity"></div>
                </div>
              </div>
              <span class="text-sm text-gray-400 group-hover:text-gray-300 transition-colors select-none">Female</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer group">
              <div class="relative">
                <input type="radio" name="gender" value="other" class="sr-only peer/other">
                <div class="w-5 h-5 rounded-full border border-dark-border bg-dark-input peer-checked/other:bg-primary peer-checked/other:border-primary transition-all duration-200 flex items-center justify-center">
                  <div class="w-2 h-2 rounded-full bg-white opacity-0 peer-checked/other:opacity-100 transition-opacity"></div>
                </div>
              </div>
              <span class="text-sm text-gray-400 group-hover:text-gray-300 transition-colors select-none">Other</span>
            </label>
          </div>
        </div>

        <!-- Address -->
        <div class="input-field relative" id="addressField">
          <label for="address" class="block text-xs font-medium text-gray-400 mb-2 tracking-wide uppercase">Address <span class="text-gray-600 normal-case font-normal">(Optional)</span></label>
          <div class="relative">
            <span class="input-icon absolute left-4 top-3 text-gray-500 transition-colors duration-200">
              <i data-lucide="map-pin" class="w-5 h-5"></i>
            </span>
            <textarea
              id="address"
              placeholder="123 Main St, City, Country"
              rows="2"
              oninput="clearError('address')"
              class="w-full bg-dark-input border border-dark-border rounded-xl pl-12 pr-4 py-3 text-gray-200 placeholder-gray-600 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/30 transition-all duration-200 text-sm resize-none"
            ></textarea>
          </div>
          <p id="addressError" class="hidden text-xs text-red-400 mt-1.5 flex items-center gap-1 error-msg"></p>
        </div>

        <!-- Password -->
        <div class="input-field relative" id="passwordField">
          <label for="password" class="block text-xs font-medium text-gray-400 mb-2 tracking-wide uppercase">Password</label>
          <div class="relative">
            <span class="input-icon absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 transition-colors duration-200">
              <i data-lucide="key-round" class="w-5 h-5"></i>
            </span>
            <input
              id="password"
              type="password"
              placeholder="Create a strong password"
              autocomplete="new-password"
              oninput="clearError('password')"
              class="w-full bg-dark-input border border-dark-border rounded-xl pl-12 pr-12 py-3.5 text-gray-200 placeholder-gray-600 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/30 transition-all duration-200 text-sm"
            >
            <button type="button" onclick="togglePassword('password', 'eye-icon')" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition-colors">
              <i data-lucide="eye" id="eye-icon" class="w-5 h-5"></i>
            </button>
          </div>
          <p id="passwordError" class="hidden text-xs text-red-400 mt-1.5 flex items-center gap-1 error-msg"></p>
        </div>

        <!-- Confirm Password -->
        <div class="input-field relative" id="confirmPasswordField">
          <label for="confirmPassword" class="block text-xs font-medium text-gray-400 mb-2 tracking-wide uppercase">Confirm Password</label>
          <div class="relative">
            <span class="input-icon absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 transition-colors duration-200">
              <i data-lucide="key-round" class="w-5 h-5"></i>
            </span>
            <input
              id="confirmPassword"
              type="password"
              placeholder="Re-enter your password"
              autocomplete="new-password"
              oninput="clearError('confirmPassword')"
              class="w-full bg-dark-input border border-dark-border rounded-xl pl-12 pr-12 py-3.5 text-gray-200 placeholder-gray-600 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/30 transition-all duration-200 text-sm"
            >
            <button type="button" onclick="togglePassword('confirmPassword', 'eye-icon-cp')" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition-colors">
              <i data-lucide="eye" id="eye-icon-cp" class="w-5 h-5"></i>
            </button>
          </div>
          <p id="confirmPasswordError" class="hidden text-xs text-red-400 mt-1.5 flex items-center gap-1 error-msg"></p>
        </div>

        <!-- Terms -->
        <div class="flex items-start gap-2.5">
          <label class="flex items-start gap-2.5 cursor-pointer group mt-0.5">
            <div class="relative shrink-0 mt-0.5">
              <input type="checkbox" id="terms" class="sr-only peer/terms">
              <div class="w-5 h-5 rounded-md border border-dark-border bg-dark-input peer-checked/terms:bg-primary peer-checked/terms:border-primary transition-all duration-200 flex items-center justify-center">
                <i data-lucide="check" class="w-3 h-3 text-white opacity-0 peer-checked/terms:opacity-100 transition-opacity"></i>
              </div>
            </div>
            <span class="text-sm text-gray-400 group-hover:text-gray-300 transition-colors select-none leading-snug">
              I agree to the
              <a href="#" class="text-primary hover:text-primaryHover transition-colors font-medium">Terms of Service</a>
              and
              <a href="#" class="text-primary hover:text-primaryHover transition-colors font-medium">Privacy Policy</a>
            </span>
          </label>
        </div>
        <p id="termsError" class="hidden text-xs text-red-400 -mt-2 flex items-center gap-1 error-msg"></p>

        <!-- Submit -->
        <button
          type="submit"
          class="w-full bg-primary hover:bg-primaryHover text-white font-semibold font-heading py-3.5 rounded-xl transition-all duration-200 hover:shadow-lg hover:shadow-primary/20 hover:-translate-y-0.5 active:translate-y-0 flex items-center justify-center gap-2 text-sm tracking-wide"
        >
          Create Account
          <i data-lucide="arrow-right" class="w-4 h-4"></i>
        </button>

      </form>

    </div>

    <!-- Back to login -->
    <p class="text-center text-sm text-gray-500 mt-6">
      Already have an account?
      <a href="login.html" class="text-primary hover:text-primaryHover transition-colors font-medium">Sign in</a>
    </p>

    <!-- Decorative Orbs -->
    <div class="fixed top-16 left-16 w-48 h-48 bg-primary/5 rounded-full blur-3xl float-animation pointer-events-none hidden lg:block"></div>
    <div class="fixed bottom-20 right-10 w-64 h-64 bg-primary/5 rounded-full blur-3xl float-animation-delay pointer-events-none hidden lg:block"></div>

  </div>

  <script>
    lucide.createIcons();

    function togglePassword(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.setAttribute('data-lucide', 'eye-off');
      } else {
        input.type = 'password';
        icon.setAttribute('data-lucide', 'eye');
      }
      lucide.createIcons();
    }

    function isValidEmail(value) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
    }

    function showError(field, message) {
      const fieldEl = document.getElementById(field + 'Field');
      const errorEl = document.getElementById(field + 'Error');
      const inputEl = document.getElementById(field);

      if (!fieldEl || !errorEl || !inputEl) return;

      fieldEl.classList.add('has-error');
      inputEl.classList.remove('border-dark-border', 'focus:border-primary', 'focus:ring-primary/30');
      inputEl.classList.add('border-red-500', 'focus:border-red-500', 'focus:ring-red-500/30');
      errorEl.innerHTML = '<i data-lucide="alert-circle" class="w-3 h-3 shrink-0"></i>' + message;
      errorEl.classList.remove('hidden');
      lucide.createIcons();
    }

    function clearError(field) {
      const fieldEl = document.getElementById(field + 'Field');
      const errorEl = document.getElementById(field + 'Error');
      const inputEl = document.getElementById(field);

      if (!fieldEl || !errorEl) return;

      fieldEl.classList.remove('has-error');
      if (inputEl) {
        inputEl.classList.remove('border-red-500', 'focus:border-red-500', 'focus:ring-red-500/30');
        inputEl.classList.add('border-dark-border', 'focus:border-primary', 'focus:ring-primary/30');
      }
      errorEl.classList.add('hidden');
      errorEl.innerHTML = '';
    }

    function shakeField(field) {
      const el = document.getElementById(field + 'Field');
      if (!el) return;
      el.classList.add('shake');
      el.addEventListener('animationend', () => el.classList.remove('shake'), { once: true });
    }

    function handleRegister(e) {
      e.preventDefault();

      const name = document.getElementById('name');
      const email = document.getElementById('email');
      const phone = document.getElementById('phone');
      const password = document.getElementById('password');
      const confirmPassword = document.getElementById('confirmPassword');
      const terms = document.getElementById('terms');
      let valid = true;

      // Name validation
      if (!name.value.trim()) {
        showError('name', 'Full name is required');
        shakeField('name');
        valid = false;
      } else {
        clearError('name');
      }

      // Email validation
      if (!email.value.trim()) {
        showError('email', 'Email is required');
        shakeField('email');
        valid = false;
      } else if (!isValidEmail(email.value.trim())) {
        showError('email', 'Please enter a valid email address');
        shakeField('email');
        valid = false;
      } else {
        clearError('email');
      }

      // Phone validation (optional but must be 10 digits if filled)
      if (phone.value.trim() && phone.value.trim().length !== 10) {
        showError('phone', 'Phone number must be exactly 10 digits');
        shakeField('phone');
        valid = false;
      } else {
        clearError('phone');
      }

      // Password validation
      if (!password.value.trim()) {
        showError('password', 'Password is required');
        shakeField('password');
        valid = false;
      } else if (password.value.length < 6) {
        showError('password', 'Password must be at least 6 characters');
        shakeField('password');
        valid = false;
      } else {
        clearError('password');
      }

      // Confirm password validation
      if (!confirmPassword.value.trim()) {
        showError('confirmPassword', 'Please confirm your password');
        shakeField('confirmPassword');
        valid = false;
      } else if (confirmPassword.value.trim() !== password.value.trim()) {
        showError('confirmPassword', 'Passwords do not match');
        shakeField('confirmPassword');
        valid = false;
      } else {
        clearError('confirmPassword');
      }

      // Terms validation
      const termsError = document.getElementById('termsError');
      if (!terms.checked) {
        termsError.innerHTML = '<i data-lucide="alert-circle" class="w-3 h-3 shrink-0"></i>You must agree to the terms and privacy policy';
        termsError.classList.remove('hidden');
        lucide.createIcons();
        valid = false;
      } else {
        termsError.classList.add('hidden');
        termsError.innerHTML = '';
      }

      if (valid) {
        const formData = {
          name: name.value.trim(),
          email: email.value.trim(),
          phone: phone.value.trim(),
          gender: document.querySelector('input[name="gender"]:checked')?.value || '',
          address: document.getElementById('address').value.trim(),
          password: password.value,
        };
        console.log('Register:', formData);
      }
    }
  </script>

</body>
</html>
