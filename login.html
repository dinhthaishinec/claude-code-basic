<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            dark: {
              bg: '#090A14',
              card: '#0F111A',
              border: '#1E2030',
              input: '#13151F',
            },
            primary: '#DF6B33',
            primaryHover: '#C95D2A',
          },
          fontFamily: {
            heading: ['Poppins', 'sans-serif'],
            body: ['Inter', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    body { background-color: #090A14; }

    .input-field:focus-within .input-icon {
      color: #DF6B33;
    }

    .input-field.has-error .input-icon {
      color: #EF4444;
    }

    .social-btn:hover {
      background-color: #1a1d2e;
      border-color: #DF6B33;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    .float-animation {
      animation: float 4s ease-in-out infinite;
    }

    .float-animation-delay {
      animation: float 4s ease-in-out 1s infinite;
    }

    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-text-fill-color: #E2E8F0;
      -webkit-box-shadow: 0 0 0px 1000px #13151F inset;
      transition: background-color 5000s ease-in-out 0s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }

    .shake {
      animation: shake 0.4s ease-in-out;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .error-msg {
      animation: slideDown 0.2s ease-out;
    }
  </style>
</head>
<body class="min-h-screen bg-dark-bg font-body text-gray-300 flex items-center justify-center p-4">

  <div class="w-full max-w-md">

    <!-- Logo + Title -->
    <div class="text-center mb-8 float-animation">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary/10 border border-primary/20 mb-4">
        <i data-lucide="lock-keyhole" class="w-8 h-8 text-primary"></i>
      </div>
      <h1 class="font-heading font-extrabold text-3xl text-white tracking-tight">Welcome Back</h1>
      <p class="text-gray-500 mt-2 text-sm">Sign in to your account to continue</p>
    </div>

    <!-- Login Card -->
    <div class="bg-dark-card rounded-3xl border border-dark-border p-6 sm:p-8 shadow-2xl shadow-black/50">

      <!-- Form -->
      <form id="loginForm" class="space-y-5" novalidate onsubmit="handleLogin(event)">

        <!-- Email -->
        <div class="input-field relative" id="emailField">
          <label for="email" class="block text-xs font-medium text-gray-400 mb-2 tracking-wide uppercase">Email</label>
          <div class="relative">
            <span class="input-icon absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 transition-colors duration-200">
              <i data-lucide="mail" class="w-5 h-5"></i>
            </span>
            <input
              id="email"
              type="email"
              placeholder="you@example.com"
              autocomplete="email"
              oninput="clearError('email')"
              class="w-full bg-dark-input border border-dark-border rounded-xl pl-12 pr-4 py-3.5 text-gray-200 placeholder-gray-600 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/30 transition-all duration-200 text-sm"
            >
          </div>
          <p id="emailError" class="hidden text-xs text-red-400 mt-1.5 flex items-center gap-1 error-msg"></p>
        </div>

        <!-- Password -->
        <div class="input-field relative" id="passwordField">
          <label for="password" class="block text-xs font-medium text-gray-400 mb-2 tracking-wide uppercase">Password</label>
          <div class="relative">
            <span class="input-icon absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 transition-colors duration-200">
              <i data-lucide="key-round" class="w-5 h-5"></i>
            </span>
            <input
              id="password"
              type="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              oninput="clearError('password')"
              class="w-full bg-dark-input border border-dark-border rounded-xl pl-12 pr-12 py-3.5 text-gray-200 placeholder-gray-600 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/30 transition-all duration-200 text-sm"
            >
            <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition-colors">
              <i data-lucide="eye" id="eye-icon" class="w-5 h-5"></i>
            </button>
          </div>
          <p id="passwordError" class="hidden text-xs text-red-400 mt-1.5 flex items-center gap-1 error-msg"></p>
        </div>

        <!-- Remember + Forgot -->
        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2.5 cursor-pointer group">
            <div class="relative">
              <input type="checkbox" id="remember" class="sr-only peer">
              <div class="w-5 h-5 rounded-md border border-dark-border bg-dark-input peer-checked:bg-primary peer-checked:border-primary transition-all duration-200 peer-hover:border-primary/50 flex items-center justify-center">
                <i data-lucide="check" class="w-3 h-3 text-white opacity-0 peer-checked:opacity-100 transition-opacity"></i>
              </div>
            </div>
            <span class="text-sm text-gray-400 group-hover:text-gray-300 transition-colors select-none">Remember me</span>
          </label>
          <a href="#" class="text-sm text-primary hover:text-primaryHover transition-colors font-medium">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          class="w-full bg-primary hover:bg-primaryHover text-white font-semibold font-heading py-3.5 rounded-xl transition-all duration-200 hover:shadow-lg hover:shadow-primary/20 hover:-translate-y-0.5 active:translate-y-0 flex items-center justify-center gap-2 text-sm tracking-wide"
        >
          Sign In
          <i data-lucide="arrow-right" class="w-4 h-4"></i>
        </button>

      </form>

      <!-- Divider -->
      <div class="flex items-center gap-3 my-7">
        <div class="flex-1 h-px bg-dark-border"></div>
        <span class="text-xs text-gray-600 font-medium uppercase tracking-widest">Or continue with</span>
        <div class="flex-1 h-px bg-dark-border"></div>
      </div>

      <!-- Social Login -->
      <div class="grid grid-cols-3 gap-3">

        <!-- Google -->
        <button class="social-btn group flex flex-col items-center justify-center gap-1.5 py-3 rounded-xl border border-dark-border bg-dark-input hover:border-primary/50 transition-all duration-200">
          <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          <span class="text-xs text-gray-400 group-hover:text-gray-300 transition-colors font-medium">Google</span>
        </button>

        <!-- GitHub -->
        <button class="social-btn group flex flex-col items-center justify-center gap-1.5 py-3 rounded-xl border border-dark-border bg-dark-input hover:border-primary/50 transition-all duration-200">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
            <path fill="#E2E8F0" d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
          </svg>
          <span class="text-xs text-gray-400 group-hover:text-gray-300 transition-colors font-medium">GitHub</span>
        </button>

        <!-- Facebook -->
        <button class="social-btn group flex flex-col items-center justify-center gap-1.5 py-3 rounded-xl border border-dark-border bg-dark-input hover:border-primary/50 transition-all duration-200">
          <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            <path fill="#FFFFFF" d="M15.828 14.672h2.025l-.305 2.19h-1.72V21H14.17v-4.138h-1.72v-2.19h1.72V8.99c0-1.35.54-2.1 1.84-2.1h1.72v1.96h-.96c-.45 0-.6.2-.6.63v1.56h1.63l-.3 2.19z"/>
          </svg>
          <span class="text-xs text-gray-400 group-hover:text-gray-300 transition-colors font-medium">Facebook</span>
        </button>
      </div>

    </div>

    <!-- Sign up link -->
    <p class="text-center text-sm text-gray-500 mt-6">
      Don't have an account?
      <a href="#" class="text-primary hover:text-primaryHover transition-colors font-medium">Create account</a>
    </p>

    <!-- Decorative Orbs -->
    <div class="fixed top-16 left-16 w-48 h-48 bg-primary/5 rounded-full blur-3xl float-animation pointer-events-none hidden lg:block"></div>
    <div class="fixed bottom-20 right-10 w-64 h-64 bg-primary/5 rounded-full blur-3xl float-animation-delay pointer-events-none hidden lg:block"></div>

  </div>

  <script>
    lucide.createIcons();

    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.setAttribute('data-lucide', 'eye-off');
      } else {
        input.type = 'password';
        icon.setAttribute('data-lucide', 'eye');
      }
      lucide.createIcons();
    }

    function isValidEmail(value) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
    }

    function showError(field, message) {
      const fieldEl = document.getElementById(field + 'Field');
      const errorEl = document.getElementById(field + 'Error');
      const inputEl = document.getElementById(field);

      fieldEl.classList.add('has-error');
      inputEl.classList.remove('border-dark-border', 'focus:border-primary', 'focus:ring-primary/30');
      inputEl.classList.add('border-red-500', 'focus:border-red-500', 'focus:ring-red-500/30');
      errorEl.innerHTML = '<i data-lucide="alert-circle" class="w-3 h-3 shrink-0"></i>' + message;
      errorEl.classList.remove('hidden');
      lucide.createIcons();
    }

    function clearError(field) {
      const fieldEl = document.getElementById(field + 'Field');
      const errorEl = document.getElementById(field + 'Error');
      const inputEl = document.getElementById(field);

      fieldEl.classList.remove('has-error');
      inputEl.classList.remove('border-red-500', 'focus:border-red-500', 'focus:ring-red-500/30');
      inputEl.classList.add('border-dark-border', 'focus:border-primary', 'focus:ring-primary/30');
      errorEl.classList.add('hidden');
      errorEl.innerHTML = '';
    }

    function shakeField(field) {
      const el = document.getElementById(field + 'Field');
      el.classList.add('shake');
      el.addEventListener('animationend', () => el.classList.remove('shake'), { once: true });
    }

    function handleLogin(e) {
      e.preventDefault();

      const email = document.getElementById('email');
      const password = document.getElementById('password');
      let valid = true;

      // Email validation
      if (!email.value.trim()) {
        showError('email', 'Email is required');
        shakeField('email');
        valid = false;
      } else if (!isValidEmail(email.value.trim())) {
        showError('email', 'Please enter a valid email address');
        shakeField('email');
        valid = false;
      } else {
        clearError('email');
      }

      // Password validation
      if (!password.value.trim()) {
        showError('password', 'Password is required');
        shakeField('password');
        valid = false;
      } else {
        clearError('password');
      }

      if (valid) {
        // Form is valid — ready for backend submission
        console.log('Login:', { email: email.value.trim(), password: password.value.trim() });
      }
    }
  </script>

</body>
</html>
